name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-amd64:
    name: Windows amd64 发行包
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 配置 Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: 配置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 校验标签与应用版本
        shell: pwsh
        run: |
          $version = (Get-Content -Raw -Encoding UTF8 wails.json | ConvertFrom-Json).info.productVersion
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "标签 $env:GITHUB_REF_NAME 与 wails.json 版本 v$version 不一致。"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 验证源码与依赖
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          go mod verify
          Push-Location frontend
          npm.cmd ci
          npm.cmd test
          npm.cmd run build
          Pop-Location
          go test ./...
          go vet ./...

      - name: 安装 Wails 与 NSIS
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          choco install nsis --yes --no-progress
          $nsis = Join-Path ${env:ProgramFiles(x86)} 'NSIS'
          if (-not (Test-Path -LiteralPath (Join-Path $nsis 'makensis.exe'))) {
            throw "未找到 NSIS：$nsis"
          }
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 构建 Windows 可执行文件与安装包
        shell: pwsh
        run: |
          $wails = Join-Path (go env GOPATH) 'bin\wails.exe'
          & $wails build -clean -platform windows/amd64 -webview2 embed -nsis -installscope user -trimpath -nocolour
          if ($LASTEXITCODE -ne 0) {
            throw "Wails 构建失败，退出码：$LASTEXITCODE"
          }

      - name: 生成 SHA-256 校验文件
        shell: pwsh
        run: |
          $expected = @(
            'build\bin\LabRemote.exe',
            'build\bin\LabRemote-amd64-installer.exe'
          )
          foreach ($path in $expected) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "缺少预期发行文件：$path"
            }
          }
          Get-ChildItem -LiteralPath build\bin -Filter '*.exe' |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
              "$hash *$($_.Name)"
            } |
            Set-Content -LiteralPath build\bin\SHA256SUMS.txt -Encoding ascii

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LabRemote-windows-amd64-${{ github.run_number }}
          path: |
            build/bin/LabRemote.exe
            build/bin/LabRemote-amd64-installer.exe
            build/bin/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: 创建 GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            (Resolve-Path 'build\bin\LabRemote.exe').Path,
            (Resolve-Path 'build\bin\LabRemote-amd64-installer.exe').Path,
            (Resolve-Path 'build\bin\SHA256SUMS.txt').Path
          )
          gh release create $env:GITHUB_REF_NAME @assets --verify-tag --generate-notes --title "LabRemote $env:GITHUB_REF_NAME"
