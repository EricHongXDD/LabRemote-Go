name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要创建或更新的版本标签，必须与 wails.json 一致"
        required: true
        default: "v1.0.0"
        type: string
      publish:
        description: "发布到 GitHub Releases；关闭时仅生成 Actions Artifact"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 校验发行版本
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 校验标签与应用版本
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="$(python3 -c 'import json; print(json.load(open("wails.json", encoding="utf-8"))["info"]["productVersion"])')"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$GITHUB_REF_NAME"
          fi
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::版本标签必须使用 v主版本.次版本.补丁版本 格式：$release_tag"
            exit 1
          fi
          if [[ "$release_tag" != "v$version" ]]; then
            echo "::error::标签 $release_tag 与 wails.json 版本 v$version 不一致"
            exit 1
          fi
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  windows-amd64:
    name: Windows amd64
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 配置 Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: 配置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Wails 与 NSIS
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          go mod verify
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          choco install nsis --yes --no-progress
          $nsis = Join-Path ([Environment]::GetEnvironmentVariable('ProgramFiles(x86)')) 'NSIS'
          if (-not (Test-Path -LiteralPath (Join-Path $nsis 'makensis.exe'))) {
            throw "未找到 NSIS：$nsis"
          }
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 构建 Windows 主程序与安装包
        shell: pwsh
        run: |
          $wails = Join-Path (go env GOPATH) 'bin\wails.exe'
          & $wails build -clean -platform windows/amd64 -webview2 embed -nsis -installscope user -trimpath -nocolour
          if ($LASTEXITCODE -ne 0) {
            throw "Wails Windows 构建失败，退出码：$LASTEXITCODE"
          }
          Copy-Item -LiteralPath build\bin\LabRemote.exe -Destination build\bin\LabRemote-windows-amd64.exe
          foreach ($path in @(
            'build\bin\LabRemote-windows-amd64.exe',
            'build\bin\LabRemote-amd64-installer.exe'
          )) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "缺少预期 Windows 发行文件：$path"
            }
          }

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LabRemote-windows-${{ needs.prepare.outputs.version }}
          path: |
            build/bin/LabRemote-windows-amd64.exe
            build/bin/LabRemote-amd64-installer.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  linux-amd64:
    name: Linux amd64
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 配置 Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: 配置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Linux 图形依赖与 Wails
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          go mod verify
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: 构建 Linux 压缩包
        shell: bash
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/wails" build -clean -platform linux/amd64 -tags webkit2_41 -trimpath -nocolour
          test -x build/bin/LabRemote
          file build/bin/LabRemote
          package_root="build/package/LabRemote"
          mkdir -p "$package_root"
          install -m 0755 build/bin/LabRemote "$package_root/LabRemote"
          install -m 0644 README.md LICENSE "$package_root/"
          tar -czf build/bin/LabRemote-linux-amd64.tar.gz -C build/package LabRemote
          test -s build/bin/LabRemote-linux-amd64.tar.gz

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LabRemote-linux-${{ needs.prepare.outputs.version }}
          path: build/bin/LabRemote-linux-amd64.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  macos-universal:
    name: macOS Universal
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 配置 Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: 配置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装 Wails
        shell: bash
        run: |
          set -euo pipefail
          go mod verify
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: 构建 macOS Universal 应用
        shell: bash
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/wails" build -clean -platform darwin/universal -trimpath -nocolour
          test -d build/bin/LabRemote.app
          binary="build/bin/LabRemote.app/Contents/MacOS/LabRemote"
          test -x "$binary"
          architectures="$(lipo -archs "$binary")"
          echo "macOS architectures: $architectures"
          grep -q "x86_64" <<< "$architectures"
          grep -q "arm64" <<< "$architectures"
          ditto -c -k --sequesterRsrc --keepParent build/bin/LabRemote.app build/bin/LabRemote-macos-universal.zip
          test -s build/bin/LabRemote-macos-universal.zip

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LabRemote-macos-${{ needs.prepare.outputs.version }}
          path: build/bin/LabRemote-macos-universal.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: 发布 GitHub Release
    needs:
      - prepare
      - windows-amd64
      - linux-amd64
      - macos-universal
    if: ${{ github.event_name == 'push' || inputs.publish == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 下载全部平台产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: 生成统一 SHA-256 清单
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          mapfile -t assets < <(find . -maxdepth 1 -type f -name 'LabRemote-*' -printf '%f\n' | sort)
          if [[ "${#assets[@]}" -ne 4 ]]; then
            printf '预期 4 个发行文件，实际为 %s：\n' "${#assets[@]}" >&2
            printf '%s\n' "${assets[@]}" >&2
            exit 1
          fi
          sha256sum "${assets[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: 创建或更新 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          if ref_json="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" 2>/dev/null)"; then
            ref_type="$(jq -r '.object.type' <<< "$ref_json")"
            ref_sha="$(jq -r '.object.sha' <<< "$ref_json")"
            if [[ "$ref_type" == "tag" ]]; then
              ref_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$ref_sha" --jq '.object.sha')"
            fi
            if [[ "$ref_sha" != "$GITHUB_SHA" ]]; then
              echo "::error::标签 $RELEASE_TAG 已指向 $ref_sha，拒绝用当前提交 $GITHUB_SHA 覆盖"
              exit 1
            fi
          fi
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -printf '%p\n' | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "LabRemote $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              --title "LabRemote $RELEASE_TAG"
          fi

      - name: 上传汇总 Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LabRemote-release-${{ needs.prepare.outputs.version }}
          path: release-assets/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
